<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form>
        <label for="nome">FULL NAME</label>
        <input type="text" id="nome" name="nome" placeholder="e.g. Maria Silva">

        <label for="email">E-MAIL</label>
        <input type="email" id="email" name="email" placeholder="maria@email.com">

        <label for="password">PASSWORD</label>
        <input type="password" id="password" name="password" placeholder="******">

        <label for="idade">AGE</label>
        <input type="number" id="number" name="number" placeholder="25">

        <label for="Bio">BIO</label>
        <textarea id="Bio" name="Bio" rows="6" cols="35" placeholder="Tell us about yourself...">

        </textarea>

        <label for="course">COURSE</label>
        <select name="select">
            <option value="" disabled selected>Select a course...</option>
            <option value="Development">Web Development</option>
            <option value="Science">Data Science</option>
            <option value="Design">UX Design</option>
            <option value="Cybersecurity">Cybersecurity</option>
        </select>

        <fieldset>
            <legend>SKILLS</legend>
            <input type="checkbox" id="html&css" name="html&css" checked />
            <label for="html&css">HTML & CSS</label>

            <input type="checkbox" id="javascript" name="javascript" checked />
            <label for="javascript">JAVASCRIPT</label>

            <input type="checkbox" id="python" name="python" checked />
            <label for="python">PYTHON</label>
        </fieldset>


        <fieldset>
            <legend>EXPERIENCE LEVEL</legend>
            <input type="radio" id="beginner" name="EXPERIENCE LEVEL" value="beginner" checked>
            <label for="beginner">BEGINNER</label>
            <input type="radio" id="intermediate" name="EXPERIENCE LEVEL" value="intermediate">
            <label for="intermediate">INTERMEDIATE</label>
            <input type="radio" id="advanced" name="EXPERIENCE LEVEL" value="advanced">
            <label for="advanced">ADVANCED</label>
        </fieldset>

        <label for="self">SELF-CONFIDENCE(0-10)</label>
        <input type="range" id="self" name="self" min="0" max="10" />

        <label for="file-upload">UPLOAD CV</label>
        <input type="file" id="file-upload" name="fileToUpload">

        <label for="button">ACTIONS</label>
        <button class="b1" type="submit">Submit</button>
        <button class="b2" type="submit">Clear</button>
        <button class="b3" type="submit">Delete</button>

    </form>

</body>

</html>
